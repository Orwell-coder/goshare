name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      installer_url: ${{ steps.meta.outputs.installer_url }}
      installer_sha256: ${{ steps.meta.outputs.installer_sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Go mod tidy
        run: go mod tidy

      - name: Cross-compile (Windows amd64)
        run: GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o goshare.exe ./cmd/goshare/

      - name: Verify binary
        run: |
          if [ ! -f goshare.exe ]; then
            echo "ERROR: goshare.exe not found after build"
            exit 1
          fi
          SIZE=$(du -h goshare.exe | cut -f1)
          echo "goshare.exe built: ${SIZE}"

      - name: Generate checksum
        run: |
          sha256sum goshare.exe > goshare.exe.sha256
          cat goshare.exe.sha256

      - name: Set winget metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "installer_url=https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/goshare.exe" >> "$GITHUB_OUTPUT"
          SHA256=$(cut -d' ' -f1 goshare.exe.sha256)
          echo "installer_sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Generate winget manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUBLISHER="Orwell-coder"
          PACKAGE="goshare"
          URL="https://github.com/${PUBLISHER}/${PACKAGE}/releases/download/${GITHUB_REF_NAME}/goshare.exe"
          SHA256=$(cut -d' ' -f1 goshare.exe.sha256)
          RELEASE_DATE=$(date +%Y-%m-%d)

          mkdir -p winget_out

          # Multi-file manifest (singleton is rejected by winget-pkgs).
          # \$schema is escaped so it stays literal in the yaml-language-server comment.

          # 1. Version manifest
          cat > "winget_out/${PUBLISHER}.${PACKAGE}.yaml" << EOF
          # yaml-language-server: \$schema=https://aka.ms/winget-manifest.version.1.12.0.schema.json

          PackageIdentifier: ${PUBLISHER}.${PACKAGE}
          PackageVersion: ${VERSION}
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.12.0
          EOF

          # 2. Installer manifest
          cat > "winget_out/${PUBLISHER}.${PACKAGE}.installer.yaml" << EOF
          # yaml-language-server: \$schema=https://aka.ms/winget-manifest.installer.1.12.0.schema.json

          PackageIdentifier: ${PUBLISHER}.${PACKAGE}
          PackageVersion: ${VERSION}
          InstallerType: portable
          Installers:
          - Architecture: x64
            InstallerUrl: ${URL}
            InstallerSha256: ${SHA256}
          ManifestType: installer
          ManifestVersion: 1.12.0
          ReleaseDate: ${RELEASE_DATE}
          EOF

          # 3. Default locale manifest
          cat > "winget_out/${PUBLISHER}.${PACKAGE}.locale.en-US.yaml" << EOF
          # yaml-language-server: \$schema=https://aka.ms/winget-manifest.defaultLocale.1.12.0.schema.json

          PackageIdentifier: ${PUBLISHER}.${PACKAGE}
          PackageVersion: ${VERSION}
          PackageLocale: en-US
          Publisher: ${PUBLISHER}
          PublisherUrl: https://github.com/${PUBLISHER}/${PACKAGE}
          PackageName: GoShare
          PackageUrl: https://github.com/${PUBLISHER}/${PACKAGE}
          License: MIT
          ShortDescription: High-performance LAN file sharing tool
          Description: GoShare is a single-binary file sharing tool for LAN environments. Provides both a browser-based HTTP interface and a high-speed TCP CLI client for fast folder transfers.
          Tags:
          - file-sharing
          - lan
          - cli
          - go
          ManifestType: defaultLocale
          ManifestVersion: 1.12.0
          EOF

          echo "Winget manifests generated:"
          ls -1 winget_out/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: "GoShare ${{ github.ref_name }}"
          body: |
            ## GoShare ${{ github.ref_name }}

            高性能局域网文件分享工具 — 单二进制，CS+BS 混合架构。

            ### 安装

            ```powershell
            # winget
            winget install Orwell-coder.goshare

            # 直接下载
            Invoke-WebRequest -Uri "https://github.com/Orwell-coder/goshare/releases/download/${{ github.ref_name }}/goshare.exe" -OutFile goshare.exe

            # go install
            go install github.com/Orwell-coder/goshare/cmd/goshare@${{ github.ref_name }}
            ```
          files: |
            goshare.exe
            goshare.exe.sha256
            winget_out/Orwell-coder.goshare.yaml
            winget_out/Orwell-coder.goshare.installer.yaml
            winget_out/Orwell-coder.goshare.locale.en-US.yaml
          generate_release_notes: true

  winget:
    needs: release
    uses: ./.github/workflows/winget.yml
    with:
      version: ${{ needs.release.outputs.version }}
      installer_url: ${{ needs.release.outputs.installer_url }}
      installer_sha256: ${{ needs.release.outputs.installer_sha256 }}
    secrets: inherit
